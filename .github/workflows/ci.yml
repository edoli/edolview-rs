name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux
          - os: windows-latest
            suffix: windows
          - os: macos-latest
            suffix: mac

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      OPENCV_LINK_STATIC: 1
      PKG_CONFIG_ALL_STATIC: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ----- Cache vcpkg installations to speed up dependency builds -----
      - name: Cache vcpkg (Linux)
        if: startsWith(runner.os, 'Linux')
        uses: actions/cache@v4
        with:
          path: |
            target/vcpkg/installed/x64-linux-release
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Cache vcpkg (macOS)
        if: startsWith(runner.os, 'macOS')
        uses: actions/cache@v4
        with:
          path: |
            target/vcpkg/installed/arm64-osx-release
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Cache vcpkg (Windows)
        if: startsWith(runner.os, 'Windows')
        uses: actions/cache@v4
        with:
          path: |
            target/vcpkg/installed/x64-windows-static-md
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

              

      # ----- Cache OpenCV install directories -----
      - name: Cache OpenCV install (Ubuntu)
        if: startsWith(runner.os, 'Linux')
        uses: actions/cache@v4
        with:
          path: .opencv/install
          key: opencv4-${{ runner.os }}-4.12.0
          restore-keys: |
            opencv4-${{ runner.os }}-

      - name: Cache OpenCV install (macOS)
        if: startsWith(runner.os, 'macOS')
        uses: actions/cache@v4
        with:
          path: .opencv/install
          key: opencv4-${{ runner.os }}-4.12.0
          restore-keys: |
            opencv4-${{ runner.os }}-

      - name: Cache OpenCV install (Windows)
        if: startsWith(runner.os, 'Windows')
        uses: actions/cache@v4
        with:
          path: .opencv/install
          key: opencv4-${{ runner.os }}-4.12.0
          restore-keys: |
            opencv4-${{ runner.os }}-

      # ----- Cache Chocolatey packages (Windows) -----
      - name: Cache Chocolatey packages (Windows)
        if: startsWith(runner.os, 'Windows')
        uses: actions/cache@v4
        with:
          path: |
            C:\ProgramData\chocolatey\lib
            C:\ProgramData\chocolatey\bin
          key: choco-${{ runner.os }}-llvm-cmake-ninja-git-curl-unzip-nasm-v1
          restore-keys: |
            choco-${{ runner.os }}-

      # ----- Linux (Ubuntu) OpenCV deps -----
      - name: Install OpenCV deps (Ubuntu)
        if: startsWith(runner.os, 'Linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git curl unzip pkg-config \
            clang libclang-dev llvm-dev nasm

      - name: Build OpenCV 4.12.0 (Ubuntu)
        if: startsWith(runner.os, 'Linux')
        env:
          OPENCV_VERSION: 4.12.0
        run: |
          set -e
          OPENCV_VERSION=${OPENCV_VERSION}
          WORKDIR="$GITHUB_WORKSPACE/.opencv"
          SRC_DIR="$WORKDIR/opencv-$OPENCV_VERSION"
          INSTALL_DIR="$WORKDIR/install"
          mkdir -p "$WORKDIR"
          if [ -d "$INSTALL_DIR/lib/cmake/opencv4" ]; then
            echo "OpenCV already installed at $INSTALL_DIR";
          else
            cd "$WORKDIR"
            if [ ! -d "$SRC_DIR" ]; then
              echo "Downloading OpenCV $OPENCV_VERSION sources"
              git clone -b release https://github.com/edoli/opencv-edolview.git $SRC_DIR
            fi
            test -f "$SRC_DIR/CMakeLists.txt" || { echo "CMakeLists.txt not found in $SRC_DIR"; ls -al "$WORKDIR"; exit 1; }
            cd "$SRC_DIR"
            sh cmake_script.sh
          fi
          echo "PKG_CONFIG_PATH=$INSTALL_DIR/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "OPENCV_PKGCONFIG=1" >> $GITHUB_ENV
          echo "OPENCV_LINK_STATIC=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALL_STATIC=1" >> $GITHUB_ENV

          export PKG_CONFIG_PATH="$INSTALL_DIR/lib/pkgconfig:${PKG_CONFIG_PATH}"
          export OPENCV_PKGCONFIG=1 OPENCV_LINK_STATIC=1 PKG_CONFIG_ALL_STATIC=1
          pkg-config --modversion opencv4 || true

      # ----- macOS OpenCV -----
      - name: Build OpenCV 4.12.0 (macOS static)
        if: startsWith(runner.os, 'macOS')
        env:
          OPENCV_VERSION: 4.12.0
        run: |
          set -e
          # Basic deps
          brew update
          brew install cmake llvm nasm
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LIBCLANG_PATH=$LLVM_PREFIX/lib" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=$LLVM_PREFIX/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "PATH=$LLVM_PREFIX/bin:$PATH" >> $GITHUB_ENV
          OPENCV_VERSION=${OPENCV_VERSION}
          WORKDIR="$GITHUB_WORKSPACE/.opencv"
          SRC_DIR="$WORKDIR/opencv-$OPENCV_VERSION"
          INSTALL_DIR="$WORKDIR/install"
          # Cache check
          mkdir -p "$WORKDIR"
          if [ -d "$INSTALL_DIR/lib/cmake/opencv4" ]; then
            echo "OpenCV already installed at $INSTALL_DIR";
          else
            cd "$WORKDIR"
            if [ ! -d "$SRC_DIR" ]; then
              echo "Downloading OpenCV $OPENCV_VERSION sources"
              git clone -b release https://github.com/edoli/opencv-edolview.git $SRC_DIR
            fi
            test -f "$SRC_DIR/CMakeLists.txt" || { echo "Missing CMakeLists.txt for macOS"; ls -al "$WORKDIR"; exit 1; }
            cd "$SRC_DIR"
            sh cmake_script.sh
          fi
          echo "PKG_CONFIG_PATH=$INSTALL_DIR/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "OPENCV_PKGCONFIG=1" >> $GITHUB_ENV
          echo "OPENCV_LINK_STATIC=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALL_STATIC=1" >> $GITHUB_ENV

          export PKG_CONFIG_PATH="$INSTALL_DIR/lib/pkgconfig:${PKG_CONFIG_PATH}"
          export OPENCV_PKGCONFIG=1 OPENCV_LINK_STATIC=1 PKG_CONFIG_ALL_STATIC=1
          pkg-config --modversion opencv4 || true

      # ----- Windows OpenCV source build (similar to Ubuntu/macOS) -----
      - name: Install build deps (Windows)
        if: startsWith(runner.os, 'Windows')
        shell: pwsh
        run: |
          choco install -y --no-progress llvm cmake ninja git curl unzip nasm
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (Test-Path $llvmBin) {
            echo "PATH=$llvmBin;$env:PATH" | Out-File -FilePath $Env:GITHUB_ENV -Append
            echo "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $Env:GITHUB_ENV -Append
          }

      - name: Build OpenCV 4.12.0 (Windows static)
        if: startsWith(runner.os, 'Windows')
        shell: pwsh
        env:
          OPENCV_VERSION: 4.12.0
        run: |
          $workdir = Join-Path $env:GITHUB_WORKSPACE '.opencv'
          $installDir = Join-Path $workdir 'install'
          $srcDir = Join-Path $workdir "opencv-$env:OPENCV_VERSION"
          New-Item -ItemType Directory -Force -Path $workdir | Out-Null
          if (Test-Path (Join-Path $installDir 'x64/vc17/staticlib/OpenCVConfig.cmake')) {
            Write-Host "OpenCV already installed at $installDir"
          } else {
            if (-not (Test-Path $srcDir)) {
              Write-Host "Downloading OpenCV $env:OPENCV_VERSION sources"
              git clone -b release https://github.com/edoli/opencv-edolview.git $srcDir
            }
            if (-not (Test-Path (Join-Path $srcDir 'CMakeLists.txt'))) {
              Write-Host "CMakeLists.txt not found in $srcDir"; Get-ChildItem $workdir; exit 1
            }
            Push-Location $srcDir
            pwsh .\cmake_script.ps1
          }

          $libPath = "$installDir\x64\vc17\staticlib"
          $libs = Get-ChildItem -Path $libPath -Filter *.lib | ForEach-Object { $_.BaseName }
          $libsJoined = $libs -join ","

          Add-Content -Path $Env:GITHUB_ENV -Value "OPENCV_LINK_LIBS=$libsJoined"
          Add-Content -Path $Env:GITHUB_ENV -Value "OPENCV_LINK_PATHS=$libPath"
          Add-Content -Path $Env:GITHUB_ENV -Value "OPENCV_INCLUDE_PATHS=$installDir\include"
          Add-Content -Path $Env:GITHUB_ENV -Value "OPENCV_LINK_STATIC=1"
          
          Get-Content -Path $Env:GITHUB_ENV

      - name: Run vcpkg build
        run: |
          cargo install cargo-vcpkg
          cargo vcpkg -v build
          
      - name: Add vcpkg pkgconfig to PKG_CONFIG_PATH (Ubuntu)
        if: startsWith(runner.os, 'Linux')
        run: |
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/target/vcpkg/installed/x64-linux-release/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Add vcpkg pkgconfig to PKG_CONFIG_PATH (macOS)
        if: startsWith(runner.os, 'macOS')
        run: |
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/target/vcpkg/installed/arm64-osx-release/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          
      - name: Run icon generation
        run: cargo run -p xtask --features heif -- icons

      - name: Package release binary
        run: cargo build --release --features heif

      - name: Copy release binary to root
        run: |
          set -e
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/edolview.exe ./ || echo "Windows release binary not found"
          else
            cp target/release/edolview ./ || echo "Unix release binary not found"
          fi
          ls -al edolview* || true
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edolview-${{ matrix.suffix }}
          path: |
            edolview*
            colormap/**
          if-no-files-found: warn

      - name: Install MSI tooling
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && startsWith(runner.os, 'Windows')
        shell: pwsh
        run: |
          choco install -y --no-progress wixtoolset
          $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          if (-not (Test-Path $wixBin)) {
            $wixBin = "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin"
          }
          if (-not (Test-Path $wixBin)) {
            throw "WiX Toolset bin directory not found"
          }
          Add-Content -Path $Env:GITHUB_ENV -Value "WIX=$wixBin"
          Add-Content -Path $Env:GITHUB_ENV -Value "PATH=$wixBin;$env:PATH"

      - name: Build MSI installer
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && startsWith(runner.os, 'Windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target\wix | Out-Null
          New-Item -ItemType Directory -Force -Path target\dist | Out-Null
          & "$env:WIX\heat.exe" dir colormap -cg ColormapFiles -dr COLORMAPDIR -gg -scom -sreg -sfrag -srd -var var.ColormapDir -out target\wix\colormap.wxs
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME.StartsWith("v")) {
            $tagVersion = $env:GITHUB_REF_NAME.Substring(1)
          } else {
            $cargoVersionMatch = Select-String -Path Cargo.toml -Pattern '^version = "([^"]+)"' | Select-Object -First 1
            if (-not $cargoVersionMatch) {
              throw "Could not determine package version from Cargo.toml"
            }
            $tagVersion = $cargoVersionMatch.Matches[0].Groups[1].Value
          }
          if ($tagVersion -match '^\d+\.\d+\.\d+$') {
            $productVersion = "$tagVersion.0"
          } elseif ($tagVersion -match '^\d+\.\d+\.\d+\.\d+$') {
            $productVersion = $tagVersion
          } else {
            throw "Unsupported tag version for WiX: $tagVersion"
          }
          & "$env:WIX\candle.exe" -ext WixUIExtension -arch x64 "-dProjectDir=$env:GITHUB_WORKSPACE" "-dColormapDir=$env:GITHUB_WORKSPACE\colormap" "-dReleaseBinDir=$env:GITHUB_WORKSPACE\target\release" "-dProductVersion=$productVersion" -out target\wix\ packaging\windows\edolview.wxs target\wix\colormap.wxs
          & "$env:WIX\light.exe" -ext WixUIExtension -out target\dist\edolview-installer-msi.msi target\wix\edolview.wixobj target\wix\colormap.wixobj

      - name: Install macOS packaging tools
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && startsWith(runner.os, 'macOS')
        run: brew install create-dmg

      - name: Build DMG installer
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && startsWith(runner.os, 'macOS')
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(python -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['package']['version'])")"
          fi
          APP_ROOT="target/dmg-root/Edolview.app/Contents"
          mkdir -p "$APP_ROOT/MacOS" "$APP_ROOT/Resources"
          cp target/release/edolview "$APP_ROOT/MacOS/edolview"
          cp -R colormap "$APP_ROOT/MacOS/colormap"
          cp icons/Edolview.icns "$APP_ROOT/Resources/edolview.icns"
          sed -e "s/__VERSION__/$VERSION/g" -e "s/__SHORT_VERSION__/$VERSION/g" packaging/macos/Info.plist.in > "$APP_ROOT/Info.plist"
          chmod +x "$APP_ROOT/MacOS/edolview"
          mkdir -p target/dist
          create-dmg \
            --volname "Edolview" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 128 \
            --icon "Edolview.app" 200 190 \
            --hide-extension "Edolview.app" \
            --app-drop-link 600 185 \
            "target/dist/edolview-installer-dmg.dmg" \
            "target/dmg-root"

      - name: Install Linux packaging tools
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && startsWith(runner.os, 'Linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends desktop-file-utils zsync
          cargo install cargo-deb

      - name: Build DEB package
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && startsWith(runner.os, 'Linux')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/dist
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == v* ]]; then
            DEB_VERSION="${GITHUB_REF_NAME#v}"
          else
            DEB_VERSION="$(python -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['package']['version'])")"
          fi
          cargo deb --no-build --deb-version "$DEB_VERSION" --output target/dist/edolview-installer-deb.deb

      - name: Build AppImage package
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && startsWith(runner.os, 'Linux')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps target/dist
          cp target/release/edolview AppDir/usr/bin/edolview
          cp -R colormap AppDir/usr/bin/colormap
          cp packaging/edolview.desktop AppDir/usr/share/applications/edolview.desktop
          cp icons/hicolor/256x256/apps/edolview.png AppDir/usr/share/icons/hicolor/256x256/apps/edolview.png
          cp icons/hicolor/256x256/apps/edolview.png AppDir/edolview.png
          cp packaging/linux/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun
          curl -Lo linuxdeploy.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy.AppImage --appdir AppDir --desktop-file packaging/edolview.desktop --icon-file icons/hicolor/256x256/apps/edolview.png --output appimage
          APPIMAGE_OUTPUT="$(find . -maxdepth 1 -type f -name '*.AppImage' ! -name 'linuxdeploy.AppImage' | head -n 1)"
          mv "$APPIMAGE_OUTPUT" target/dist/edolview-installer-appimage.AppImage

      - name: Upload MSI installer artifact
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && startsWith(runner.os, 'Windows')
        uses: actions/upload-artifact@v4
        with:
          name: edolview-installer-msi
          path: target/dist/edolview-installer-msi.msi
          if-no-files-found: warn

      - name: Upload DMG installer artifact
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && startsWith(runner.os, 'macOS')
        uses: actions/upload-artifact@v4
        with:
          name: edolview-installer-dmg
          path: target/dist/edolview-installer-dmg.dmg
          if-no-files-found: warn

      - name: Upload DEB installer artifact
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && startsWith(runner.os, 'Linux')
        uses: actions/upload-artifact@v4
        with:
          name: edolview-installer-deb
          path: target/dist/edolview-installer-deb.deb
          if-no-files-found: warn

      - name: Upload AppImage installer artifact
        if: (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && startsWith(runner.os, 'Linux')
        uses: actions/upload-artifact@v4
        with:
          name: edolview-installer-appimage
          path: target/dist/edolview-installer-appimage.AppImage
          if-no-files-found: warn

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          for f in */edolview*; do
            [ -f "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS.txt || shasum -a 256 "$f" >> SHA256SUMS.txt
          done
          cat SHA256SUMS.txt

      - name: Prepare release assets
        run: |
          set -e
          cd dist
          for dir in edolview-linux edolview-mac edolview-windows; do
            if [ -d "$dir" ]; then
              (cd "$dir" && zip -9 -r ../"$dir".zip . >/dev/null 2>&1 || true)
            fi
          done
          ls -al

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/**/*.msi
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/SHA256SUMS.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
